<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miami Cafe Loyalty</title>

<style>
body {
font-family: Arial, sans-serif;
text-align: center;
padding: 40px 20px;
background: #f5f5f5;
}

.container {
max-width: 400px;
margin: auto;
background: white;
padding: 25px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
margin-bottom: 20px;
}

input, select {
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 6px;
border: 1px solid #ccc;
font-size: 16px;
}

button {
width: 100%;
padding: 14px;
background: black;
color: white;
border: none;
border-radius: 6px;
font-size: 16px;
margin-top: 10px;
}

#status {
margin-top: 15px;
font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
<h2>Miami Cafe Loyalty</h2>

<input id="name" placeholder="Name / Magaca">
<input id="phone" placeholder="Phone / Lambarka">

<select id="action">
<option value="Visit / Booqasho">Visit / Booqasho</option>
<option value="Redeem / Abaalmarin qaado">Redeem / Abaalmarin qaado</option>
</select>

<button onclick="sendForm()">Submit / Gudbi</button>

<p id="status"></p>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwsdfaAw23-uxkytrbxR3jsbM3Ch0a6Gqkjz0On_bES5_zWdlxy8f5JKLil6nxhZR_B/exec";

async function sendForm() {
const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const action = document.getElementById("action").value;
const status = document.getElementById("status");

if (!name || !phone) {
status.textContent = "Please fill in name and phone. / Fadlan geli magaca iyo lambarka.";
return;
}

status.textContent = "Submitting... / Waa la dirayaa...";

try {
const response = await fetch(WEB_APP_URL, {
method: "POST",
headers: {
"Content-Type": "text/plain;charset=utf-8"
},
body: JSON.stringify({ name, phone, action })
});

const text = await response.text();
console.log(text);

if (!response.ok) {
throw new Error("Request failed");
}

status.textContent = "Submitted successfully! / Si guul leh ayaa loo gudbiyey.";

// Clear form
document.getElementById("name").value = "";
document.getElementById("phone").value = "";
document.getElementById("action").value = "Visit / Booqasho";

} catch (error) {
console.error(error);
status.textContent = "Submit failed. / Diristu way fashilantay.";
}
}
</script>

</body>
</html>
